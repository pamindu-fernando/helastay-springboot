<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Hela Stay</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">

  <!-- Visual Side -->
  <div class="auth-visual">
    <div class="hero-bg-orb hero-bg-orb-1"></div>
    <div class="hero-bg-orb hero-bg-orb-2"></div>
    <div style="position:relative;z-index:1;text-align:center;max-width:400px;">
      <img src="/logo.png" alt="Hela Stay Logo" style="height: 140px; width: auto; object-fit: contain; display: block; margin: 0 auto var(--space-6) auto;">
      <h2 style="font-size:2rem;font-weight:800;margin-bottom:var(--space-4);">Secure Recovery</h2>
      <p style="color:var(--text-2);line-height:1.8;">Get back into your account securely with an email verification code.</p>
    </div>
  </div>

  <!-- Form Side -->
  <div class="auth-form-side">
    <div class="auth-form-box">
      <div class="auth-logo">
        <a href="/index.html"><img src="/logo.png" alt="Hela Stay Logo" style="height: 48px; width: auto; object-fit: contain;"></a>
      </div>

      <div id="step-1">
        <h1 style="font-size:1.75rem;font-weight:800;margin-bottom:var(--space-2);">Reset Password</h1>
        <p style="color:var(--text-3);font-size:0.9rem;margin-bottom:var(--space-8);">Enter your email address and we'll send you a 6-digit verification code.</p>
        
        <form id="forgot-form" novalidate>
          <div style="display:flex;flex-direction:column;gap:var(--space-5);">
            <div class="form-group">
              <label class="form-label" for="email">Email address</label>
              <input class="form-control" type="email" id="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="send-code-btn">Send Code</button>
            <div style="text-align:center; margin-top:var(--space-3);">
              <a href="login.html" style="color:var(--text-3); font-size:0.9rem; font-weight:500;">Back to Sign in</a>
            </div>
          </div>
        </form>
      </div>

      <div id="step-2" style="display:none;">
        <h1 style="font-size:1.75rem;font-weight:800;margin-bottom:var(--space-2);">Enter Code</h1>
        <p style="color:var(--text-3);font-size:0.9rem;margin-bottom:var(--space-8);">We sent a verification code to your email. It expires in 15 minutes.</p>
        
        <form id="reset-form" novalidate>
          <div style="display:flex;flex-direction:column;gap:var(--space-5);">
            <div class="form-group">
              <label class="form-label" for="code">6-Digit Code</label>
              <input class="form-control" type="text" id="code" placeholder="123456" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="new-password">New Password</label>
              <input class="form-control" type="password" id="new-password" placeholder="At least 8 characters" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="reset-pw-btn">Reset Password</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>

<script type="module" src="../js/forgot-password.js"></script>
</body>
</html>
